apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: signbuddy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: signbuddy/backend:latest # built from infra/docker/Dockerfile.backend
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: signbuddy-config
            - secretRef:
                name: signbuddy-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: signbuddy
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
  # sessionAffinity: ClientIP could help WebSocket connection stability behind
  # multiple replicas, but the WS layer is stateless per-connection (auth via
  # token, no server-side session state held across reconnects), so default
  # round-robin is fine.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: signbuddy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
