apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: signbuddy
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: signbuddy
            - name: POSTGRES_DB
              value: signbuddy
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: signbuddy-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "signbuddy"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: signbuddy
spec:
  clusterIP: None # headless, for StatefulSet
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

# NOTE: For production, prefer a managed Postgres (AWS RDS / Aurora) over
# self-hosting in-cluster. This StatefulSet is provided for completeness
# and for staging/dev clusters where a managed DB isn't justified.
