apiVersion: v1
kind: Namespace
metadata:
  name: signbuddy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: signbuddy-config
  namespace: signbuddy
data:
  NODE_ENV: "production"
  CORS_ORIGIN: "https://app.signbuddy.ai"
  AI_SERVICE_URL: "http://ai-service:8000"
  PORT: "4000"
---
# Secrets are NOT committed with real values — apply separately via:
#   kubectl create secret generic signbuddy-secrets \
#     --from-literal=DATABASE_URL=postgresql://... \
#     --from-literal=JWT_ACCESS_SECRET=... \
#     --from-literal=JWT_REFRESH_SECRET=... \
#     -n signbuddy
apiVersion: v1
kind: Secret
metadata:
  name: signbuddy-secrets
  namespace: signbuddy
type: Opaque
stringData:
  DATABASE_URL: "CHANGE_ME_replace_via_kubectl_or_secrets_manager"
  JWT_ACCESS_SECRET: "CHANGE_ME"
  JWT_REFRESH_SECRET: "CHANGE_ME"
  POSTGRES_PASSWORD: "CHANGE_ME"
