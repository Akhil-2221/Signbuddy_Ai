version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: signbuddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: signbuddy
      POSTGRES_PASSWORD: signbuddy_dev_password
      POSTGRES_DB: signbuddy
    ports:
      - "5432:5432"
    volumes:
      - signbuddy_pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signbuddy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  signbuddy_pg_data:
