name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: signbuddy
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: signbuddy_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U signbuddy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Apply schema
        run: |
          psql postgresql://signbuddy:test_password@localhost:5432/signbuddy_test -f ../database/migrations/001_init_schema.sql
        env:
          PGPASSWORD: test_password
      - run: npm test
        env:
          DATABASE_URL: postgresql://signbuddy:test_password@localhost:5432/signbuddy_test
          JWT_ACCESS_SECRET: ci_test_secret
          JWT_REFRESH_SECRET: ci_test_refresh_secret

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.signbuddy.ai
          NEXT_PUBLIC_WS_URL: wss://api.signbuddy.ai

  ai-service-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m py_compile app/main.py pipeline/*.py
      - run: pytest -q

  docker-build:
    needs: [backend-test, frontend-build, ai-service-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: infra/docker/Dockerfile.backend
          push: false
          tags: signbuddy/backend:${{ github.sha }}
      - name: Build ai-service image
        uses: docker/build-push-action@v5
        with:
          context: ai-service
          file: infra/docker/Dockerfile.ai-service
          push: false
          tags: signbuddy/ai-service:${{ github.sha }}
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: infra/docker/Dockerfile.frontend
          push: false
          tags: signbuddy/frontend:${{ github.sha }}

  # Deploy job intentionally left as a template — wire in real registry push
  # (ECR/GHCR) and `kubectl apply` / `helm upgrade` once cluster credentials
  # and a real container registry are provisioned.
